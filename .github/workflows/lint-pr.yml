name: Lint PR Title

# PR タイトルを commitlint 規約（type・scope 必須・日本語 subject）で検証する。
# squash マージ時にコミットメッセージになるため、タイトルも規約に揃える。
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: lint-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commitlint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate PR title
        env:
          # 環境変数経由で渡してシェルインジェクションを防ぐ
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | pnpm exec commitlint --config commitlint.pr.config.ts
