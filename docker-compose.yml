services:
  db:
    image: postgres:17-alpine
    container_name: staff-report-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: staff_report
    ports:
      - '5433:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d staff_report']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
